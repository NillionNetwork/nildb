deployment:
  name: cmacrae-testing
  container:
    # image: 592920173613.dkr.ecr.eu-west-1.amazonaws.com/datablocks-api
    image: docker.io/library/busybox
    tag: "@{TF_VAR_deployment_image_tag}"
    port: 8080
    
    resources:
      cpu: 1024
      memory: 1024
    
    environment:
      APP_ENV: prod
      APP_LOG_LEVEL: debug
      APP_PORT: 8080
    
    secrets:
      APP_DB_URI: nildb_db_uri
      APP_JWT_SECRET: nildb_jwt_secret

    command: ["sh", "-c", "sleep 500000"]

  scaling:
    desired_count: 1
  
  network:
    public_access: true
    allowed_cidrs: ["0.0.0.0/0"]

vars:
  common:
    repo_name: "NillionNetwork/nil-db"
  
  sandbox:
    name_prefix: sandbox
    zone_name: "sandbox.nilogy.xyz"
    secrets_recovery_window_in_days: 0
  
  staging-branch:
    name_prefix: staging-branch
    secrets_recovery_window_in_days: 0

  trying-branch:
    name_prefix: trying-branch
    secrets_recovery_window_in_days: 0
